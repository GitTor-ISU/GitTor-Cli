name: Report

on:
  workflow_call:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libtorrent-rasterbar-dev libglib2.0-dev libgit2-dev
            libcurl4-openssl-dev libjson-glib-dev valgrind clang-tidy
          version: 1.0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: cpplint-cache-${{ hashFiles('requirements.txt') }}

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Make Report
        run: |
          make report

      - name: Download Windows Executable
        uses: actions/download-artifact@v4
        with:
          name: gittor-exe
          path: ./gittor-exe

      - name: Zip Windows Executable
        run: |
          zip -r ./site/gittor-exe.zip ./gittor-exe

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

  wiki:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: ${{github.repository}}
          path: ${{github.repository}}

      - name: Checkout Wiki
        uses: actions/checkout@v4
        with:
          repository: ${{github.repository}}.wiki
          path: ${{github.repository}}.wiki

      - name: Publish Wiki
        run: |
          set -e
          cd $GITHUB_WORKSPACE/${{github.repository}}.wiki
          find . -mindepth 1 -not -path './.git*' -exec rm -rf {} +
          cp -r $GITHUB_WORKSPACE/${{github.repository}}/docs/* .
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff-index --quiet HEAD || git commit -m "action: wiki sync (commit ${{github.sha}})" && git push
